<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brown GP - Pro Timing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&family=Roboto+Mono:wght@500;700&display=swap');
        body { background-color: #111111; color: #ffffff; font-family: 'Titillium Web', sans-serif; margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background-color: #e10600; color: #ffffff; padding: 12px 18px; border-radius: 6px; font-weight: 700; font-size: 0.9rem; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border-left: 5px solid #ffcc00; animation: slideIn 0.3s ease-out forwards; letter-spacing: 0.5px; line-height: 1.3; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.fade-out { opacity: 0; transform: translateX(10px); transition: all 0.3s ease-in; }
        .header { background-color: #15151e; color: white; padding: 15px 10px; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; border-radius: 8px 8px 0 0; border-top: 4px solid #e10600; margin-bottom: 0; text-align: center; width: 100%; max-width: 500px; box-sizing: border-box; letter-spacing: 0.5px; }
        .session-ended-banner { background-color: #e10600; color: white; font-size: 0.85rem; font-weight: 700; text-align: center; padding: 6px 0; width: 100%; max-width: 500px; letter-spacing: 1px; display: none; }
        .timing-tower { background-color: #1a1a24; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); border-radius: 0 0 8px 8px; overflow: hidden; }
        .grid-quali, .grid-practice { grid-template-columns: 50px 70px 50px 70px 1fr; }
        .grid-race { grid-template-columns: 50px 70px 50px 65px 65px 1fr; }
        .tower-header { display: grid; background-color: #242430; padding: 12px 0; font-size: 0.75rem; font-weight: 600; color: #a0a0b0; border-bottom: 2px solid #e10600; }
        .tower-header > div { display: flex; align-items: center; justify-content: flex-start; }
        .tower-header .center { justify-content: center; }
        .driver-container { border-bottom: 1px solid #2a2a35; cursor: pointer; transition: background-color 0.2s; }
        .driver-container:hover { background-color: #20202c; }
        .driver-container:last-child { border-bottom: none; }
        .driver-container.eliminated .driver-row { opacity: 0.4; }
        .driver-row { display: grid; padding: 8px 0; align-items: center; font-size: 1.05rem; font-weight: 700; }
        .chevron { font-size: 0.65rem; color: #ffffff; margin-right: 6px; transition: transform 0.2s; display: inline-block; }
        .driver-container.open .chevron { transform: rotate(90deg); }
        .expanded-details { display: none; background-color: #111118; padding: 12px 15px; font-size: 0.85rem; color: #a0a0b0; border-top: 1px dashed #2a2a35; flex-direction: column; gap: 10px; }
        .driver-container.open .expanded-details { display: flex; }
        .expanded-row { display: flex; justify-content: space-between; width: 100%; }
        .expanded-row div { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .expanded-row span { color: #ffffff; font-family: 'Roboto Mono', monospace; font-size: 0.95rem; }
        .purple { color: #d600ff !important; font-weight: bold; }
        .green { color: #00e640 !important; }
        .yellow { color: #ffe600 !important; }
        .pos { display: flex; align-items: center; padding-left: 8px; color: #ffffff; font-size: 0.95rem;}
        .driver { display: flex; align-items: center; border-left: 4px solid; padding-left: 8px; height: 100%; letter-spacing: 1px; }
        .tyre-col { display: flex; align-items: center; gap: 4px; font-size: 0.85rem; color: #d0d0d0;}
        
        /* Added a 'U' class for unknown tyres if F1 drops the compound string */
        .tyre { width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.75rem; font-weight: bold; border: 2px solid; background: transparent; color: white; }
        .tyre.S { border-color: #ff2a2a; color: #ff2a2a; } .tyre.M { border-color: #ffe600; color: #ffe600; } .tyre.H { border-color: #ffffff; color: #ffffff; } .tyre.I { border-color: #00e640; color: #00e640; } .tyre.W { border-color: #00aaff; color: #00aaff; } .tyre.U { border-color: #555555; color: #a0a0b0; }
        
        .data-mono { font-family: 'Roboto Mono', monospace; font-size: 0.95rem; }
        .time-best { color: #00e640; }
        .gap { color: #ffffff; }
        .loading { padding: 30px; text-align: center; color: #a0a0b0; font-weight: 600; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="header" id="session-header">Connecting to F1 Data...</div>
    <div class="session-ended-banner" id="session-ended-banner">LIVE SESSION HAS ENDED</div>
    <div class="timing-tower">
        <div id="tower-header-container"></div>
        <div id="leaderboard"><div class="loading">Bootstrapping Telemetry...</div></div>
    </div>

    <script>
        const BACKEND_URL = "https://brown-gp.onrender.com";
        const driverLapHistory = {}; 
        
        const FALLBACK_DRIVERS = {
            "1": { Tla: "NOR", TeamColour: "FF8000" }, "3": { Tla: "VER", TeamColour: "3671C6" },
            "5": { Tla: "BOR", TeamColour: "E50000" }, "6": { Tla: "HAD", TeamColour: "3671C6" },
            "10": { Tla: "GAS", TeamColour: "0093CC" }, "11": { Tla: "PER", TeamColour: "FFB800" },
            "12": { Tla: "ANT", TeamColour: "27F4D2" }, "14": { Tla: "ALO", TeamColour: "229971" },
            "16": { Tla: "LEC", TeamColour: "E8002D" }, "18": { Tla: "STR", TeamColour: "229971" },
            "23": { Tla: "ALB", TeamColour: "64C4FF" }, "27": { Tla: "HUL", TeamColour: "E50000" },
            "30": { Tla: "LAW", TeamColour: "6692FF" }, "31": { Tla: "OCO", TeamColour: "B6BABD" },
            "41": { Tla: "LIN", TeamColour: "6692FF" }, "43": { Tla: "COL", TeamColour: "0093CC" },
            "44": { Tla: "HAM", TeamColour: "E8002D" }, "55": { Tla: "SAI", TeamColour: "64C4FF" },
            "63": { Tla: "RUS", TeamColour: "27F4D2" }, "77": { Tla: "BOT", TeamColour: "FFB800" },
            "81": { Tla: "PIA", TeamColour: "FF8000" }, "87": { Tla: "BEA", TeamColour: "B6BABD" }
        };
        
        let seenMessages = new Set();
        let isFirstLoad = true; 
        const triggerKeywords = ["SAFETY CAR", "YELLOW", "PENALTY", "INVESTIGATED", "INVESTIGATION", "BLACK AND WHITE", "FLAG"];

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.prepend(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        async function fetchLiveTiming() {
            try {
                const [sessionRes, timingRes, driverRes, appRes, msgRes] = await Promise.all([
                    fetch(`${BACKEND_URL}/api/session`),
                    fetch(`${BACKEND_URL}/api/timing`),
                    fetch(`${BACKEND_URL}/api/drivers`),
                    fetch(`${BACKEND_URL}/api/timingapp`),
                    fetch(`${BACKEND_URL}/api/messages`)
                ]);

                const sessionData = await sessionRes.json();
                const timingData = await timingRes.json();
                const driverData = await driverRes.json();
                const appData = await appRes.json();
                const msgData = await msgRes.json();

                if (msgData && msgData.Messages) {
                    msgData.Messages.forEach(m => {
                        const uniqueId = m.Utc + m.Message;
                        if (!seenMessages.has(uniqueId)) {
                            seenMessages.add(uniqueId);
                            if (!isFirstLoad) {
                                const text = (m.Message || "").toUpperCase();
                                if (triggerKeywords.some(kw => text.includes(kw))) showToast(m.Message);
                            }
                        }
                    });
                }
                isFirstLoad = false; 

                const sType = (sessionData.Type || "Race").toLowerCase();
                let mode = "RACE";
                if (sType.includes("practice")) mode = "PRACTICE";
                if (sType.includes("qualifying") || sType.includes("shootout")) mode = "QUALI";

                let maxLiveLaps = 0;
                if (timingData && timingData.Lines) {
                    Object.values(timingData.Lines).forEach(d => {
                        const l = parseInt(d.NumberOfLaps || 0);
                        if (l > maxLiveLaps) maxLiveLaps = l;
                    });
                }

                if (sessionData && !sessionData.error) {
                    const meetingName = sessionData.Meeting?.Name || "Formula 1";
                    let sessionName = sessionData.Name || "Live Session";
                    if (mode === "QUALI" && timingData.SessionPart) sessionName += ` - Q${timingData.SessionPart}`;

                    const status = (sessionData.SessionStatus || "").toLowerCase();
                    let isSessionEnded = ["inactive", "finished", "aborted", "finalised"].includes(status);
                    if (mode === "RACE" && maxLiveLaps > 0 && maxLiveLaps < 75) isSessionEnded = false; 

                    const bannerEl = document.getElementById('session-ended-banner');
                    const headerEl = document.getElementById('session-header');
                    
                    if (isSessionEnded) {
                        bannerEl.style.display = "block";
                        headerEl.style.borderTopColor = "#a0a0b0"; 
                    } else {
                        bannerEl.style.display = "none";
                        headerEl.style.borderTopColor = "#e10600";
                    }
                    headerEl.innerText = `${meetingName} | ${sessionName}`;
                }

                const headerContainer = document.getElementById('tower-header-container');
                if (mode === "RACE") {
                    headerContainer.innerHTML = `
                        <div class="tower-header grid-race">
                            <div class="pos-header">POS</div>
                            <div>DRIVER</div>
                            <div>TYRE</div>
                            <div>INT</div>
                            <div>GAP</div>
                            <div class="center">STOPS</div>
                        </div>`;
                } else {
                    headerContainer.innerHTML = `
                        <div class="tower-header grid-quali">
                            <div class="pos-header">POS</div>
                            <div>DRIVER</div>
                            <div>TYRE</div>
                            <div>GAP</div>
                            <div>LAP TIME</div>
                        </div>`;
                }

                const leaderboard = document.getElementById('leaderboard');
                const openContainers = document.querySelectorAll('.driver-container.open');
                const openNames = Array.from(openContainers).map(c => c.dataset.driver);

                let activeDrivers = [];
                const driverProfiles = driverData.Lines || driverData || {};
                const appLines = appData.Lines || {};

                // 🚨 GOD MODE: Loop through our fallback list to guarantee every driver is checked, even if F1's feed drops them!
                for (const driverNum of Object.keys(FALLBACK_DRIVERS)) {
                    const driverInfo = (timingData.Lines || {})[driverNum] || {};
                    
                    if (driverInfo.Retired || driverInfo.Stopped) continue;

                    let pos = parseInt(driverInfo.Position) || 99;

                    // 🚨 BULLETPROOF STINTS (Fixes the Pitstop math bug)
                    const stintsData = appLines[driverNum]?.Stints;
                    let tyreAge = 0;
                    let currentTyre = 'U'; // U for Unknown if F1 drops it
                    let pitStops = 0;

                    if (stintsData) {
                        const stintKeys = Object.keys(stintsData).filter(k => !isNaN(k)).map(Number);
                        if (stintKeys.length > 0) {
                            // The highest Key ID is equal to the Pitstop count!
                            pitStops = Math.max(...stintKeys);
                            const lastStint = stintsData[pitStops];
                            
                            if (lastStint && lastStint.Compound) {
                                const compound = lastStint.Compound.toUpperCase();
                                if(compound.includes('SOFT')) currentTyre = 'S';
                                else if(compound.includes('MEDIUM')) currentTyre = 'M';
                                else if(compound.includes('HARD')) currentTyre = 'H';
                                else if(compound.includes('INTERMEDIATE')) currentTyre = 'I';
                                else if(compound.includes('WET')) currentTyre = 'W';
                            }
                            if (lastStint) tyreAge = lastStint.NewLaps || lastStint.TotalLaps || 0;
                        }
                    }

                    const gap = driverInfo.GapToLeader || '';
                    const interval = driverInfo.IntervalToPositionAhead?.Value || '';
                    const bestLap = driverInfo.BestLapTime?.Value || 'NO TIME';

                    // 🚨 MATHEMATICAL POSITION CALCULATION
                    let gapVal = 9999;
                    if (gap) {
                        if (gap.includes('LAP')) gapVal = 1000 + parseInt(gap);
                        else gapVal = parseFloat(gap.replace('+', '')) || 0;
                    } else if (pos === 1) {
                        gapVal = 0;
                    } else if (pos !== 99) {
                        gapVal = pos * 100; // Emergency fallback sorting
                    }
                    
                    const lastLap = driverInfo.LastLapTime?.Value;
                    if (mode === "PRACTICE") {
                        if (!driverLapHistory[driverNum]) driverLapHistory[driverNum] = [];
                        if (lastLap && driverLapHistory[driverNum][0] !== lastLap) {
                            driverLapHistory[driverNum].unshift(lastLap);
                            if (driverLapHistory[driverNum].length > 5) driverLapHistory[driverNum].pop();
                        }
                    }

                    let q1 = '--', q2 = '--', q3 = '--';
                    if (driverInfo.BestLapTimes && Array.isArray(driverInfo.BestLapTimes)) {
                        if (driverInfo.BestLapTimes.length > 0) q1 = driverInfo.BestLapTimes[0].Value || '--';
                        if (driverInfo.BestLapTimes.length > 1) q2 = driverInfo.BestLapTimes[1].Value || '--';
                        if (driverInfo.BestLapTimes.length > 2) q3 = driverInfo.BestLapTimes[2].Value || '--';
                    }

                    const sData = driverInfo.Sectors || [];
                    const sectors = [0,1,2].map(i => {
                        if (!sData[i]) return { val: '--', class: '' };
                        let cls = '';
                        if (sData[i].OverallFastest) cls = 'purple';
                        else if (sData[i].PersonalFastest) cls = 'green';
                        else cls = 'yellow';
                        return { val: sData[i].Value || '--', class: cls };
                    });

                    const apiProfile = driverProfiles[driverNum] || {};
                    const fallbackProfile = FALLBACK_DRIVERS[driverNum] || {};
                    const finalTla = apiProfile.Tla || fallbackProfile.Tla || "UNK";
                    const finalColor = '#' + (apiProfile.TeamColour || fallbackProfile.TeamColour || 'a0a0b0').replace('##', '#');

                    let isEliminated = false;
                    if (mode === "QUALI" && timingData.SessionPart) {
                        const part = parseInt(timingData.SessionPart);
                        if (part === 1 && pos > 15) isEliminated = true;
                        if (part === 2 && pos > 10) isEliminated = true;
                    }

                    activeDrivers.push({
                        num: driverNum, pos: pos, name: finalTla, color: finalColor,
                        best: bestLap, gap: gap, int: interval, gapVal: gapVal,
                        tyre: currentTyre, age: tyreAge, stops: pitStops,
                        q1: q1, q2: q2, q3: q3, s1: sectors[0], s2: sectors[1], s3: sectors[2],
                        eliminated: isEliminated
                    });
                }

                if (activeDrivers.length > 0) {
                    // Sort mathematically by Gap to Leader to fix missing F1 positions
                    activeDrivers.sort((a, b) => a.gapVal - b.gapVal);
                    
                    let visualPos = 1;

                    leaderboard.innerHTML = ''; 
                    activeDrivers.forEach(d => {
                        const container = document.createElement('div');
                        container.className = `driver-container ${d.eliminated ? 'eliminated' : ''}`;
                        container.dataset.driver = d.name; 
                        if (openNames.includes(d.name)) container.classList.add('open');
                        container.onclick = function() { this.classList.toggle('open'); };

                        let mainRow = '';
                        let expandedRow = '';

                        if (mode === "RACE") {
                            mainRow = `
                                <div class="driver-row grid-race">
                                    <div class="pos">${visualPos++}</div>
                                    <div class="driver" style="border-color: ${d.color};">${d.name}</div>
                                    <div class="tyre-col">${d.age} <div class="tyre ${d.tyre}">${d.tyre === 'U' ? '' : d.tyre}</div></div>
                                    <div class="data-mono">${d.int}</div>
                                    <div class="data-mono gap">${d.gap}</div>
                                    <div class="data-mono" style="text-align:center;">${d.stops}</div>
                                </div>`;
                            expandedRow = `<div class="expanded-row"><div>Race view active.</div></div>`;
                        } else {
                            mainRow = `
                                <div class="driver-row grid-quali">
                                    <div class="pos"><span class="chevron">▶</span> ${visualPos++}</div>
                                    <div class="driver" style="border-color: ${d.color};">${d.name}</div>
                                    <div class="tyre-col">${d.age} <div class="tyre ${d.tyre}">${d.tyre === 'U' ? '' : d.tyre}</div></div>
                                    <div class="data-mono gap">${d.gap}</div>
                                    <div class="data-mono time-best">${d.best}</div>
                                </div>`;
                            
                            const sectorsUI = `
                                <div class="expanded-row">
                                    <div>S1 <span class="${d.s1.class}">${d.s1.val}</span></div>
                                    <div>S2 <span class="${d.s2.class}">${d.s2.val}</span></div>
                                    <div>S3 <span class="${d.s3.class}">${d.s3.val}</span></div>
                                </div>`;

                            if (mode === "QUALI") {
                                expandedRow = `
                                    ${sectorsUI}
                                    <div class="expanded-row" style="margin-top: 5px;">
                                        <div>Q1 <span>${d.q1}</span></div>
                                        <div>Q2 <span>${d.q2}</span></div>
                                        <div>Q3 <span>${d.q3}</span></div>
                                    </div>`;
                            } else if (mode === "PRACTICE") {
                                const h = driverLapHistory[d.num] || [];
                                const historyHTML = h.length > 0 ? h.map(lap => `<span>${lap}</span>`).join('') : `<span>Waiting for laps...</span>`;
                                expandedRow = `
                                    ${sectorsUI}
                                    <div style="margin-top: 5px; text-align:center; color:#fff;">
                                        <span style="color:#a0a0b0; font-size:0.75rem; display:block;">PAST 5 LAPS (LIVE)</span>
                                        <div style="display:flex; justify-content:space-between; width:100%; padding-top:4px;">
                                            ${historyHTML}
                                        </div>
                                    </div>`;
                            }
                        }
                        container.innerHTML = mainRow + `<div class="expanded-details">${expandedRow}</div>`;
                        leaderboard.appendChild(container);
                    });
                }
            } catch (error) { console.error("Error pulling F1 stream data:", error); }
        }

        fetchLiveTiming();
        setInterval(fetchLiveTiming, 3000);
    </script>
</body>
</html>
