<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brown GP - Live Timing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&family=Roboto+Mono:wght@500&display=swap');

        body {
            background-color: #111111;
            color: #ffffff;
            font-family: 'Titillium Web', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background-color: #15151e;
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px 8px 0 0;
            border-top: 4px solid #e10600;
            margin-bottom: 0;
            text-align: center;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            letter-spacing: 0.5px;
        }

        .timing-tower {
            background-color: #1a1a24;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        .tower-header {
            display: grid;
            grid-template-columns: 60px 80px 1fr 60px;
            background-color: #242430;
            padding: 12px 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #a0a0b0;
            border-bottom: 2px solid #e10600;
        }

        .tower-header > div { display: flex; align-items: center; }
        .pos-header { justify-content: center; }
        .driver-header { padding-left: 10px; }
        .time-header { padding-left: 20px; }
        .tyre-header { justify-content: center; }

        .driver-row {
            display: grid;
            grid-template-columns: 60px 80px 1fr 60px;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a35;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .driver-row:last-child { border-bottom: none; }
        .pos { text-align: center; justify-content: center; display: flex; color: #ffffff; }
        .driver { display: flex; align-items: center; border-left: 4px solid; padding-left: 10px; height: 100%; letter-spacing: 1px; }
        .time { color: #00e640; font-family: 'Roboto Mono', monospace; text-align: left; padding-left: 20px; font-size: 1rem; }
        .tyre-col { display: flex; justify-content: center; }

        .tyre {
            width: 22px; height: 22px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 0.8rem;
            font-weight: bold; border: 2px solid; background: transparent;
        }

        .tyre.S { border-color: #ff2a2a; color: #ff2a2a; } 
        .tyre.M { border-color: #ffe600; color: #ffe600; } 
        .tyre.H { border-color: #ffffff; color: #ffffff; } 
        .tyre.I { border-color: #00e640; color: #00e640; } 
        .tyre.W { border-color: #00aaff; color: #00aaff; } 

        .loading { padding: 30px; text-align: center; color: #a0a0b0; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header" id="session-header">
        Connecting to F1 Data...
    </div>

    <div class="timing-tower">
        <div class="tower-header">
            <div class="pos-header">POS</div>
            <div class="driver-header">DRIVER</div>
            <div class="time-header">LAP TIME</div>
            <div class="tyre-header">TYRE</div>
        </div>
        <div id="leaderboard">
            <div class="loading">Bootstrapping Telemetry...</div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://brown-gp.onrender.com";

        async function fetchLiveTiming() {
            try {
                // 1. Fetch Session, Timing, AND Drivers!
                const [sessionRes, timingRes, driverRes] = await Promise.all([
                    fetch(`${BACKEND_URL}/api/session`),
                    fetch(`${BACKEND_URL}/api/timing`),
                    fetch(`${BACKEND_URL}/api/drivers`)
                ]);

                const sessionData = await sessionRes.json();
                const timingData = await timingRes.json();
                const driverData = await driverRes.json();

                // 2. Build the Header - Check if session is Inactive!
                if (sessionData && !sessionData.error) {
                    const meetingName = sessionData.Meeting?.Name || "Formula 1";
                    const sessionName = sessionData.Name || "Live Session";
                    
                    let statusText = "";
                    if (sessionData.SessionStatus === "Inactive") {
                        statusText = " | FINAL STANDINGS";
                        document.getElementById('session-header').style.borderTopColor = "#a0a0b0"; // Make it grey to show it's over
                    }

                    document.getElementById('session-header').innerText = `${meetingName} | ${sessionName}${statusText}`;
                }

                // 3. Parse Data and Merge Drivers
                const leaderboard = document.getElementById('leaderboard');

                if (timingData && timingData.Lines) {
                    let activeDrivers = [];
                    
                    // Handle F1's weird DriverList structure
                    const driverProfiles = driverData.Lines || driverData || {};

                    for (const [driverNum, driverInfo] of Object.entries(timingData.Lines)) {
                        if (!driverInfo.Position || isNaN(driverInfo.Position)) continue;

                        let bestLap = 'NO TIME';
                        if (driverInfo.BestLapTime && driverInfo.BestLapTime.Value) {
                            bestLap = driverInfo.BestLapTime.Value;
                        }

                        let currentTyre = 'S'; 
                        if (driverInfo.Stints && driverInfo.Stints.length > 0) {
                            const lastStint = driverInfo.Stints[driverInfo.Stints.length - 1];
                            const compound = lastStint.Compound ? lastStint.Compound.toUpperCase() : '';
                            if(compound === 'SOFT') currentTyre = 'S';
                            if(compound === 'MEDIUM') currentTyre = 'M';
                            if(compound === 'HARD') currentTyre = 'H';
                            if(compound === 'INTERMEDIATE') currentTyre = 'I';
                            if(compound === 'WET') currentTyre = 'W';
                        }

                        // Grab the real name and color from the DriverList!
                        const profile = driverProfiles[driverNum] || {};

                        activeDrivers.push({
                            pos: parseInt(driverInfo.Position),
                            name: profile.Tla || "UNK",
                            color: '#' + (profile.TeamColour || 'a0a0b0').replace('##', '#'),
                            time: bestLap,
                            tyre: currentTyre
                        });
                    }

                    if (activeDrivers.length > 0) {
                        leaderboard.innerHTML = ''; 
                        activeDrivers.sort((a, b) => a.pos - b.pos).forEach(d => {
                            const row = document.createElement('div');
                            row.className = 'driver-row';
                            row.innerHTML = `
                                <div class="pos">${d.pos}</div>
                                <div class="driver" style="border-color: ${d.color};">${d.name}</div>
                                <div class="time">${d.time}</div>
                                <div class="tyre-col">
                                    <div class="tyre ${d.tyre}">${d.tyre}</div>
                                </div>
                            `;
                            leaderboard.appendChild(row);
                        });
                    }
                }
            } catch (error) {
                console.error("Error pulling F1 stream data:", error);
                // Don't nuke the board if the session just ended, only if we have NO data.
                if (document.getElementById('leaderboard').innerHTML.includes("Bootstrapping")) {
                    document.getElementById('leaderboard').innerHTML = 
                        `<div class="loading" style="color:#a0a0b0;">Waiting for next session data...</div>`;
                }
            }
        }

        fetchLiveTiming();
        setInterval(fetchLiveTiming, 10000);
    </script>
</body>
</html>
