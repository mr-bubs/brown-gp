<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brown GP - Live Timing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&family=Roboto+Mono:wght@500&display=swap');

        body {
            background-color: #111111;
            color: #ffffff;
            font-family: 'Titillium Web', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Styles */
        .header {
            background-color: #15151e;
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px 8px 0 0;
            border-top: 4px solid #e10600;
            margin-bottom: 0;
            text-align: center;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            letter-spacing: 0.5px;
            transition: border-color 0.3s ease;
        }

        .session-ended-banner {
            background-color: #e10600;
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            padding: 6px 0;
            width: 100%;
            max-width: 450px;
            letter-spacing: 1px;
            display: none; /* Hidden by default */
        }

        .timing-tower {
            background-color: #1a1a24;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        /* Grid Layout */
        .tower-header {
            display: grid;
            grid-template-columns: 65px 80px 40px 1fr;
            background-color: #242430;
            padding: 12px 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #a0a0b0;
            border-bottom: 2px solid #e10600;
        }

        .tower-header > div { display: flex; align-items: center; }
        .pos-header { padding-left: 15px; justify-content: flex-start; }
        .driver-header { padding-left: 10px; }
        .time-header { padding-left: 10px; }

        .driver-container {
            border-bottom: 1px solid #2a2a35;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .driver-container:hover {
            background-color: #20202c;
        }

        .driver-container:last-child { border-bottom: none; }

        .driver-row {
            display: grid;
            grid-template-columns: 65px 80px 40px 1fr;
            padding: 8px 0;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* The Triangle (Chevron) Styles */
        .chevron {
            font-size: 0.65rem;
            color: #ffffff;
            margin-right: 6px;
            transition: transform 0.2s ease-in-out;
            display: inline-block;
        }

        /* Rotates the triangle 90 degrees when open */
        .driver-container.open .chevron {
            transform: rotate(90deg);
        }

        .expanded-details {
            display: none; 
            background-color: #111118;
            padding: 12px 20px;
            font-size: 0.85rem;
            color: #a0a0b0;
            justify-content: space-between;
            border-top: 1px dashed #2a2a35;
        }

        .expanded-details div {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .expanded-details span {
            color: #ffffff;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.95rem;
        }

        .driver-container.open .expanded-details { display: flex; }
        .driver-container.open { background-color: #15151e; }

        /* Adjusted POS to align left and accommodate the chevron */
        .pos { display: flex; align-items: center; justify-content: flex-start; padding-left: 12px; color: #ffffff; }
        .driver { display: flex; align-items: center; border-left: 4px solid; padding-left: 10px; height: 100%; letter-spacing: 1px; }
        
        .tyre-col { display: flex; justify-content: center; align-items: center; }
        .tyre {
            width: 22px; height: 22px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 0.8rem;
            font-weight: bold; border: 2px solid; background: transparent;
        }

        .tyre.S { border-color: #ff2a2a; color: #ff2a2a; } 
        .tyre.M { border-color: #ffe600; color: #ffe600; } 
        .tyre.H { border-color: #ffffff; color: #ffffff; } 
        .tyre.I { border-color: #00e640; color: #00e640; } 
        .tyre.W { border-color: #00aaff; color: #00aaff; } 

        .time { color: #00e640; font-family: 'Roboto Mono', monospace; text-align: left; padding-left: 10px; font-size: 1rem; }

        .loading { padding: 30px; text-align: center; color: #a0a0b0; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header" id="session-header">
        Connecting to F1 Data...
    </div>
    <div class="session-ended-banner" id="session-ended-banner">
        LIVE SESSION HAS ENDED
    </div>

    <div class="timing-tower">
        <div class="tower-header">
            <div class="pos-header">POS</div>
            <div class="driver-header">DRIVER</div>
            <div></div> 
            <div class="time-header">LAP TIME</div>
        </div>
        <div id="leaderboard">
            <div class="loading">Bootstrapping Telemetry...</div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://brown-gp.onrender.com";

        async function fetchLiveTiming() {
            try {
                const [sessionRes, timingRes, driverRes] = await Promise.all([
                    fetch(`${BACKEND_URL}/api/session`),
                    fetch(`${BACKEND_URL}/api/timing`),
                    fetch(`${BACKEND_URL}/api/drivers`)
                ]);

                const sessionData = await sessionRes.json();
                const timingData = await timingRes.json();
                const driverData = await driverRes.json();

                if (sessionData && !sessionData.error) {
                    const meetingName = sessionData.Meeting?.Name || "Formula 1";
                    const sessionName = sessionData.Name || "Live Session";
                    const headerEl = document.getElementById('session-header');
                    const bannerEl = document.getElementById('session-ended-banner');
                    
                    // Bulletproof session end detection
                    const status = (sessionData.SessionStatus || "").toLowerCase();
                    const archiveStatus = (sessionData.ArchiveStatus?.Status || "").toLowerCase();
                    
                    const isSessionEnded = ["inactive", "finished", "aborted", "finalised"].includes(status) || ["generating", "complete"].includes(archiveStatus);
                    
                    if (isSessionEnded) {
                        bannerEl.style.display = "block";
                        headerEl.style.borderTopColor = "#a0a0b0"; 
                        headerEl.innerText = `${meetingName} | ${sessionName}`;
                    } else {
                        bannerEl.style.display = "none";
                        headerEl.style.borderTopColor = "#e10600";
                        headerEl.innerText = `${meetingName} | ${sessionName}`;
                    }
                }

                const leaderboard = document.getElementById('leaderboard');
                const openContainers = document.querySelectorAll('.driver-container.open');
                const openNames = Array.from(openContainers).map(c => c.dataset.driver);

                if (timingData && timingData.Lines) {
                    let activeDrivers = [];
                    const driverProfiles = driverData.Lines || driverData || {};

                    for (const [driverNum, driverInfo] of Object.entries(timingData.Lines)) {
                        if (!driverInfo.Position || isNaN(driverInfo.Position)) continue;

                        let bestLap = 'NO TIME';
                        if (driverInfo.BestLapTime && driverInfo.BestLapTime.Value) {
                            bestLap = driverInfo.BestLapTime.Value;
                        }

                        let q1 = '--', q2 = '--', q3 = '--';
                        if (driverInfo.BestLapTimes && Array.isArray(driverInfo.BestLapTimes)) {
                            if (driverInfo.BestLapTimes.length > 0) q1 = driverInfo.BestLapTimes[0].Value || '--';
                            if (driverInfo.BestLapTimes.length > 1) q2 = driverInfo.BestLapTimes[1].Value || '--';
                            if (driverInfo.BestLapTimes.length > 2) q3 = driverInfo.BestLapTimes[2].Value || '--';
                        }

                        let currentTyre = 'S'; 
                        if (driverInfo.Stints && driverInfo.Stints.length > 0) {
                            const lastStint = driverInfo.Stints[driverInfo.Stints.length - 1];
                            const compound = lastStint.Compound ? lastStint.Compound.toUpperCase() : '';
                            if(compound === 'SOFT') currentTyre = 'S';
                            if(compound === 'MEDIUM') currentTyre = 'M';
                            if(compound === 'HARD') currentTyre = 'H';
                            if(compound === 'INTERMEDIATE') currentTyre = 'I';
                            if(compound === 'WET') currentTyre = 'W';
                        }

                        const profile = driverProfiles[driverNum] || {};

                        activeDrivers.push({
                            pos: parseInt(driverInfo.Position),
                            name: profile.Tla || "UNK",
                            color: '#' + (profile.TeamColour || 'a0a0b0').replace('##', '#'),
                            time: bestLap,
                            tyre: currentTyre,
                            q1: q1,
                            q2: q2,
                            q3: q3
                        });
                    }

                    if (activeDrivers.length > 0) {
                        leaderboard.innerHTML = ''; 
                        activeDrivers.sort((a, b) => a.pos - b.pos).forEach(d => {
                            const container = document.createElement('div');
                            container.className = 'driver-container';
                            container.dataset.driver = d.name; 
                            
                            if (openNames.includes(d.name)) {
                                container.classList.add('open');
                            }

                            container.onclick = function() {
                                this.classList.toggle('open');
                            };

                            container.innerHTML = `
                                <div class="driver-row">
                                    <div class="pos"><span class="chevron">▶</span> ${d.pos}</div>
                                    <div class="driver" style="border-color: ${d.color};">${d.name}</div>
                                    <div class="tyre-col">
                                        <div class="tyre ${d.tyre}">${d.tyre}</div>
                                    </div>
                                    <div class="time">${d.time}</div>
                                </div>
                                <div class="expanded-details">
                                    <div>Q1 <span>${d.q1}</span></div>
                                    <div>Q2 <span>${d.q2}</span></div>
                                    <div>Q3 <span>${d.q3}</span></div>
                                </div>
                            `;
                            leaderboard.appendChild(container);
                        });
                    }
                }
            } catch (error) {
                console.error("Error pulling F1 stream data:", error);
                if (document.getElementById('leaderboard').innerHTML.includes("Bootstrapping")) {
                    document.getElementById('leaderboard').innerHTML = 
                        `<div class="loading" style="color:#a0a0b0;">Waiting for next session data...</div>`;
                }
            }
        }

        fetchLiveTiming();
        setInterval(fetchLiveTiming, 10000);
    </script>
</body>
</html>
