<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brown GP - Live Timing</title>
    <style>
        /* Importing fonts to match the F1 TV style */
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&family=Roboto+Mono:wght@500&display=swap');
        
        body {
            background-color: #111111; /* Dark background */
            color: #ffffff;
            font-family: 'Titillium Web', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Session Header */
        .header {
            background-color: #15151e;
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px 8px 0 0;
            border-top: 4px solid #e10600; /* F1 Red */
            margin-bottom: 0;
            text-align: center;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            letter-spacing: 0.5px;
        }

        /* Timing Tower Container */
        .timing-tower {
            background-color: #1a1a24;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        /* Column Headers */
        .tower-header {
            display: grid;
            grid-template-columns: 60px 80px 1fr 60px;
            background-color: #242430;
            padding: 12px 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #a0a0b0;
            border-bottom: 2px solid #e10600;
        }

        .tower-header > div {
            display: flex;
            align-items: center;
        }

        .pos-header { justify-content: center; }
        .driver-header { padding-left: 10px; }
        .time-header { padding-left: 20px; }
        .tyre-header { justify-content: center; }

        /* Driver Row */
        .driver-row {
            display: grid;
            grid-template-columns: 60px 80px 1fr 60px;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a35;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .driver-row:last-child {
            border-bottom: none;
        }

        /* Position */
        .pos {
            text-align: center;
            justify-content: center;
            display: flex;
            color: #ffffff;
        }

        /* Driver Acronym and Team Color */
        .driver {
            display: flex;
            align-items: center;
            border-left: 4px solid;
            padding-left: 10px;
            height: 100%;
            letter-spacing: 1px;
        }

        /* Lap Time */
        .time {
            color: #00e640; /* F1 Timing Green */
            font-family: 'Roboto Mono', monospace;
            text-align: left;
            padding-left: 20px;
            font-size: 1rem;
        }

        /* Tyre Symbol Container */
        .tyre-col {
            display: flex;
            justify-content: center;
        }

        /* Tyre Symbol Circle */
        .tyre {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            border: 2px solid;
            background: transparent;
        }

        /* Specific Tyre Colors */
        .tyre.S { border-color: #ff2a2a; color: #ff2a2a; } /* Soft */
        .tyre.M { border-color: #ffe600; color: #ffe600; } /* Medium */
        .tyre.H { border-color: #ffffff; color: #ffffff; } /* Hard */
        .tyre.I { border-color: #00e640; color: #00e640; } /* Intermediate */
        .tyre.W { border-color: #00aaff; color: #00aaff; } /* Wet */

        .loading {
            padding: 30px;
            text-align: center;
            color: #a0a0b0;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header" id="session-header">
        Connecting to F1 Data...
    </div>

    <div class="timing-tower">
        <div class="tower-header">
            <div class="pos-header">POSITION</div>
            <div class="driver-header">DRIVER</div>
            <div class="time-header">LAP TIME</div>
            <div class="tyre-header">TYRE</div>
        </div>
        <div id="leaderboard">
            <div class="loading">Fetching live F1 timings...</div>
        </div>
    </div>

    <script>
        // Formats the raw seconds into M:SS.mmm (e.g., 1:36.051)
        function formatTime(duration) {
            if (!duration) return 'NO TIME';
            const mins = Math.floor(duration / 60);
            const secs = (duration % 60).toFixed(3).padStart(6, '0');
            return `${mins}:${secs}`;
        }

        // F1 Timing Logic using the public OpenF1 REST API stream
        async function fetchLiveTiming() {
            try {
                // 1. Get the latest session to build the header
                const sessionResponse = await fetch('https://api.openf1.org/v1/sessions?latest=true');
                const sessionData = await sessionResponse.json();
                
                let sessionKey = 'latest';
                if (sessionData && sessionData.length > 0) {
                    const session = sessionData[0];
                    sessionKey = session.session_key;
                    document.getElementById('session-header').innerText = 
                        `${session.country_name} Grand Prix ${session.year} | ${session.session_name}`;
                }

                // 2. Fetch Drivers, Positions, Laps, and Tyre Stints in parallel
                const [driversRes, positionsRes, stintsRes, lapsRes] = await Promise.all([
                    fetch(`https://api.openf1.org/v1/drivers?session_key=${sessionKey}`),
                    fetch(`https://api.openf1.org/v1/position?session_key=${sessionKey}`),
                    fetch(`https://api.openf1.org/v1/stints?session_key=${sessionKey}`),
                    fetch(`https://api.openf1.org/v1/laps?session_key=${sessionKey}`)
                ]);

                const driversData = await driversRes.json();
                const positionsData = await positionsRes.json();
                const stintsData = await stintsRes.json();
                const lapsData = await lapsRes.json();

                const leaderboard = document.getElementById('leaderboard');
                leaderboard.innerHTML = ''; // Clear loading text

                // 3. Process the data for each driver
                let activeDrivers = driversData.map(driver => {
                    // Find latest position
                    const dPositions = positionsData.filter(p => p.driver_number === driver.driver_number);
                    const latestPos = dPositions.length > 0 ? dPositions[dPositions.length - 1].position : 0;
                    
                    // Find fastest lap time
                    const dLaps = lapsData.filter(l => l.driver_number === driver.driver_number && l.lap_duration);
                    let bestLap = 'NO TIME';
                    if (dLaps.length > 0) {
                        const minDuration = Math.min(...dLaps.map(l => l.lap_duration));
                        bestLap = formatTime(minDuration);
                    }

                    // Find current tyre from latest stint
                    const dStints = stintsData.filter(s => s.driver_number === driver.driver_number);
                    let currentTyre = 'S'; // Fallback
                    if (dStints.length > 0) {
                        const compound = dStints[dStints.length - 1].compound;
                        if(compound === 'SOFT') currentTyre = 'S';
                        if(compound === 'MEDIUM') currentTyre = 'M';
                        if(compound === 'HARD') currentTyre = 'H';
                        if(compound === 'INTERMEDIATE') currentTyre = 'I';
                        if(compound === 'WET') currentTyre = 'W';
                    }

                    return {
                        pos: latestPos,
                        name: driver.name_acronym,
                        color: '#' + (driver.team_colour || 'ffffff'), // Team color border
                        time: bestLap,
                        tyre: currentTyre
                    };
                });

                // 4. Sort drivers by position and render HTML rows
                activeDrivers.filter(d => d.pos > 0).sort((a, b) => a.pos - b.pos).forEach(d => {
                    const row = document.createElement('div');
                    row.className = 'driver-row';
                    row.innerHTML = `
                        <div class="pos">${d.pos}</div>
                        <div class="driver" style="border-color: ${d.color};">${d.name}</div>
                        <div class="time">${d.time}</div>
                        <div class="tyre-col">
                            <div class="tyre ${d.tyre}">${d.tyre}</div>
                        </div>
                    `;
                    leaderboard.appendChild(row);
                });

            } catch (error) {
                console.error("Error pulling F1 stream data:", error);
                document.getElementById('leaderboard').innerHTML = 
                    `<div class="loading" style="color:#ff2a2a;">Could not connect to live F1 stream. Retrying...</div>`;
            }
        }

        // Run immediately when page loads
        fetchLiveTiming();
        
        // Refresh the live data automatically every 15 seconds
        setInterval(fetchLiveTiming, 15000);
    </script>
</body>
</html>
