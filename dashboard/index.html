<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brown GP | Live Dashboard</title>
    <style>
        body { background-color: #0e1117; color: white; font-family: sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 380px; background-color: #1a1c23; padding: 20px; border-right: 1px solid #333; overflow-y: auto; position: relative; }
        .tower-header { font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        #tower-container { position: relative; min-height: 800px; margin-left: 80px; margin-top: 20px; }
        #spine { position: absolute; left: 0; top: 0; width: 6px; height: 100%; background: #333; z-index: 1; }
        
        .driver-row { position: absolute; left: -60px; display: flex; align-items: center; transition: top 0.3s ease; z-index: 2; width: 350px; }
        .tyre-info { width: 45px; text-align: right; font-size: 11px; font-weight: bold; padding-right: 8px; display: flex; align-items: center; justify-content: flex-end; }
        .tyre-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid black; margin-left: 6px; }
        .team-box { padding: 4px 6px; border: 1px solid #111; color: white; font-weight: bold; font-size: 13px; width: 60px; text-align: center; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .timing-info { padding-left: 10px; font-size: 12px; font-weight: bold; white-space: nowrap; }

        #main { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        #header-title { font-size: 20px; color: #aaa; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .map-section { flex-grow: 1; display: flex; flex-direction: column; min-height: 400px; }
        .slider-container { display: flex; gap: 20px; margin-bottom: 10px; font-size: 14px; }
        canvas { background-color: transparent; border: 1px solid #333; border-radius: 8px; width: 100%; height: 100%; box-sizing: border-box; }
        
        .rcm-section { height: 250px; margin-top: 20px; display: flex; flex-direction: column; }
        .rcm-box { flex-grow: 1; border: 1px solid #333; border-radius: 8px; background: #1a1c23; overflow-y: auto; padding: 10px; font-size: 13px; font-family: monospace; }
        .rcm-msg { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .rcm-time { color: #888; margin-right: 10px; }
        
        #f1-toast { position: fixed; top: 20px; right: -400px; width: 350px; background-color: #222; color: white; padding: 15px; border-radius: 8px; border-left: 6px solid #FFD700; box-shadow: 0px 4px 15px rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: right 0.4s ease; }
        .toast-title { font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .toast-body { font-size: 13px; }
        .toast-close { font-size: 22px; color: #888; margin-left: 15px; font-weight: bold; }
        .toast-close:hover { color: white; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="tower-header" id="lap-header">Live Race Gaps</div>
        <div id="tower-container">
            <div id="spine"></div>
        </div>
    </div>

    <div id="main">
        <h1 style="margin: 0 0 5px 0; font-size: 32px; letter-spacing: -0.5px;">Brown GP | Live Dashboard</h1>
        <div id="header-title">📍 Waiting for Session...</div>
        
        <div class="map-section">
            <div style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">Driver Tracker</div>
            <div class="slider-container">
                <label>Rotation: <input type="range" id="rotSlider" min="0" max="360" value="0"></label>
                <label>Tilt: <input type="range" id="tiltSlider" min="0" max="85" value="50"></label>
            </div>
            <canvas id="trackCanvas"></canvas>
        </div>

        <div class="rcm-section" id="rcm-anchor">
            <div style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">Race Control</div>
            <div class="rcm-box" id="rcm-board"></div>
        </div>
    </div>

    <div id="f1-toast" onclick="scrollToRCM()">
        <div>
            <div class="toast-title">⚠️ Race Control</div>
            <div class="toast-body" id="toast-text"></div>
        </div>
        <div class="toast-close" onclick="closeToast(event)">&times;</div>
    </div>

    <script>
        const canvas = document.getElementById('trackCanvas');
        const ctx = canvas.getContext('2d');
        const rotSlider = document.getElementById('rotSlider');
        const tiltSlider = document.getElementById('tiltSlider');

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            drawMap();
        }
        window.addEventListener('resize', resizeCanvas);

        let trackX = [], trackY = [], drivers = [];
        let pointSectors = []; 
        let activeYellowSectors = [];
        let cx = 0, cy = 0;

        // -> THIS IS THE CRITICAL LINE WE CHANGED TO CONNECT TO RENDER <-
        const ws = new WebSocket("wss://brown-gp.onrender.com/ws");
        
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            document.getElementById('header-title').innerText = `📍 ${data.session.title}`;
            document.getElementById('lap-header').innerText = `Live Race Gaps (${data.session.lap})`;

            // Initialize Heavy Track Data only when changed
            if (data.track && data.track.x && data.track.x.length > 0) {
                trackX = data.track.x; 
                trackY = data.track.y;
                let trackDist = data.track.dist;
                let mSectors = data.track.m_sectors;
                cx = (Math.max(...trackX) + Math.min(...trackX)) / 2;
                cy = (Math.max(...trackY) + Math.min(...trackY)) / 2;
                
                // Digitize the track points so we know what sector every pixel belongs to
                pointSectors = [];
                for(let i=0; i<trackX.length; i++) {
                    let d = trackDist[i];
                    let sNum = 1;
                    for(let m of mSectors) {
                        if (d >= m.Distance) sNum = m.Number;
                    }
                    pointSectors.push(sNum);
                }
                resizeCanvas();
            }
            
            activeYellowSectors = data.yellow_sectors || [];
            drivers = data.map_drivers;
            requestAnimationFrame(drawMap);

            renderGapTower(data.tower);
            renderRaceControl(data.rcm);
            
            if (data.active_toast) {
                showToast(data.active_toast);
            }
        };

        rotSlider.addEventListener('input', drawMap);
        tiltSlider.addEventListener('input', drawMap);

        function renderGapTower(towerData) {
            const container = document.getElementById('tower-container');
            container.innerHTML = '<div id="spine"></div>'; 
            
            const scaleY = 25; 
            const minRowSpacing = 32; // COLLISION FIX: Prevents text mushing!
            let lastActualY = -999;

            towerData.forEach(drv => {
                let idealY = drv.gap_secs * scaleY;
                let actualY = idealY;
                
                if (idealY < lastActualY + minRowSpacing) {
                    actualY = lastActualY + minRowSpacing;
                }
                lastActualY = actualY;
                
                const timingText = drv.pos === 1 ? "P1 (Leader)" : `P${drv.pos} (${drv.interval}) (${drv.gap})`;
                
                const row = document.createElement('div');
                row.className = 'driver-row';
                row.style.top = `${actualY}px`;
                
                row.innerHTML = `
                    <div class="tyre-info">
                        ${drv.t_age} (${drv.stops}) 
                        <div class="tyre-dot" style="background-color: ${drv.t_color};"></div>
                    </div>
                    <div class="team-box" style="background-color: ${drv.color};">
                        ${drv.name} ${drv.car}
                    </div>
                    <div class="timing-info">${timingText}</div>
                `;
                container.appendChild(row);
            });
            
            if (towerData.length > 0) {
                document.getElementById('spine').style.height = `${lastActualY + 50}px`;
            }
        }

        function renderRaceControl(rcmData) {
            const board = document.getElementById('rcm-board');
            board.innerHTML = '';
            
            if (rcmData.length === 0) {
                board.innerHTML = '<div style="color: #888;">🔇 No messages from Race Control yet...</div>';
                return;
            }

            rcmData.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'rcm-msg';
                div.innerHTML = `<span class="rcm-time">[${msg.time}]</span> ⚠️ <strong>FIA:</strong> ${msg.msg}`;
                board.appendChild(div);
            });
        }

        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('f1-toast');
            document.getElementById('toast-text').innerText = msg;
            toast.style.right = '20px'; 
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.style.right = '-400px'; }, 4000); 
        }

        function closeToast(e) {
            e.stopPropagation();
            document.getElementById('f1-toast').style.right = '-400px';
        }

        function scrollToRCM() {
            document.getElementById('rcm-anchor').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('f1-toast').style.right = '-400px';
        }

        function applyMath(x, y) {
            const rotRad = rotSlider.value * (Math.PI / 180);
            const tiltRad = tiltSlider.value * (Math.PI / 180);
            
            let xs = x - cx, ys = y - cy;
            let xr = xs * Math.cos(rotRad) - ys * Math.sin(rotRad);
            let yr = xs * Math.sin(rotRad) + ys * Math.cos(rotRad);
            
            let scale = Math.min(canvas.width, canvas.height) / 12000; 
            
            return { x: (canvas.width / 2) + (xr * scale), y: (canvas.height / 2) + (yr * Math.cos(tiltRad) * scale) };
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (trackX.length === 0) return;

            // 1. Track Shadow
            ctx.beginPath();
            for (let i = 0; i < trackX.length; i++) {
                let pt = applyMath(trackX[i], trackY[i]);
                if (i === 0) ctx.moveTo(pt.x, pt.y + 10);
                else ctx.lineTo(pt.x, pt.y + 10);
            }
            ctx.strokeStyle = '#000'; ctx.lineWidth = 14; ctx.lineJoin = 'round'; ctx.stroke();

            // 2. Track Surface
            ctx.beginPath();
            for (let i = 0; i < trackX.length; i++) {
                let pt = applyMath(trackX[i], trackY[i]);
                if (i === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.strokeStyle = '#333'; ctx.lineWidth = 12; ctx.stroke();

            // 3. SECTOR HIGHLIGHTING
            if (activeYellowSectors.length > 0 && pointSectors.length > 0) {
                ctx.beginPath();
                let isDrawing = false;
                for (let i = 0; i < trackX.length; i++) {
                    if (activeYellowSectors.includes(pointSectors[i])) {
                        let pt = applyMath(trackX[i], trackY[i]);
                        if (!isDrawing) { ctx.moveTo(pt.x, pt.y); isDrawing = true; }
                        else { ctx.lineTo(pt.x, pt.y); }
                    } else {
                        isDrawing = false;
                    }
                }
                ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 14; ctx.stroke();
            }

            // 4. Track White Dotted Line
            ctx.beginPath();
            for (let i = 0; i < trackX.length; i++) {
                let pt = applyMath(trackX[i], trackY[i]);
                if (i === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);

            // 5. Drivers
            drivers.forEach(drv => {
                let pt = applyMath(drv.x, drv.y);
                
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 10, 0, 2 * Math.PI);
                ctx.fillStyle = drv.color;
                ctx.fill();
                ctx.strokeStyle = drv.t_color;
                ctx.lineWidth = 2.5;
                ctx.stroke();
                
                ctx.fillStyle = 'white'; ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(drv.pos, pt.x, pt.y);
                
                if (drv.name) {
                    ctx.textAlign = 'left'; ctx.font = 'bold 11px Arial';
                    ctx.shadowColor="black"; ctx.shadowBlur=4; // Adds a shadow so names don't blend into the yellow track
                    ctx.fillText(drv.name, pt.x + 15, pt.y);
                    ctx.shadowBlur=0;
                }
            });
        }
    </script>
</body>
</html>
